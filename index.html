<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock</title>
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="stylesheet" href="./assets/css/index.css">
</head>
<body>
    <!-- HEADER -->
    <header>
    <div class="header-text">
        <h1>Feuille de Stock</h1>
        <p>Entreprise Yz26.</p>
        <p>Feuille de contrôle des Stocks</p>
        <p>Année 2026</p>
    </div>
    <button id="newEntry">+ Nouveau Relevé</button>
</header>
<!-- Overlay/Dialog : Fenetre de Saisie -->
<dialog id="entryDialog" class="entry_dialog">
    <!-- DIALOG EN OPEN : BUILD de l'APP EN COURS  -->
    <form method="dialog">
        <div id="notif_Input_Error" class="notif_error_input">
        </div>
        <h2>Nouvelle Saisie :</h2> <!-- <p>⚙️</p> -->
        <label for="matInput">Matière*</label><input id="matInput" type="text">
        <label for="epaisseurInput">Epaisseur*</label><input id="epaisseurInput" type="number" step="0.05">

        <div class="stock_input_dialog">
            <label for="stockInput">Stock Actuel*</label><input id="stockInput" type="number" step="1">
            <label for="stockMiniInput">Seuil d'alerte*</label><input id="stockMiniInput" type="number" step="1">
        </div>
        <p>* : Champs obligatoires</p>
        <div class="actionsDialog">
            <button type="button" id="btnOk">Confirmer</button>
            <button type="button" id="btnCancel">Annuler</button>
        </div>
    
    </form>
</dialog>
    <!-- MAIN -->
 <main>
<section id="contenairTable" class="contenair_table">

</section>
<section class="totalMat">
<p> Nombre de Matières enregistrées : <span id="totalMatView"></span></p>
</section>
 </main>
    <!-- FOOTER  -->
<footer>
    <div class="footer_details"> 
    <small>Yezz · 2026 | Projet-4 <sup class="version">1.0<span id="infoVersion">💠</span></sup>
        <br>
</small>
    </div>

        <p>v1.0</p>
        <ul>
            <li>Projet & fonctionnalités opérationnelles</li>
        </ul>
    </div> -->
</footer>
<!-- FIN DU MAIN -->
    <script src="./assets/main.js"></script>
</body>
</html>
